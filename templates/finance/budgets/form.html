{% extends "dashboard/base.html" %}

{% block title %}{{ action }} Presupuesto | Finanzas{% endblock %}
{% block page_title %}{{ action }} Presupuesto{% endblock %}

{% block dashboard_content %}
<div class="mb-6">
    <a href="{% url 'finance:budgets_list' %}" class="text-xs text-gray hover:text-black">
        <i class="fa-solid fa-arrow-left mr-1"></i>Volver a Presupuestos
    </a>
</div>

<div class="max-w-lg bg-white border border-light-gray rounded">
    <div class="px-6 py-4 border-b border-light-gray">
        <h3 class="text-sm font-medium text-black uppercase tracking-wider">{{ action }} Presupuesto</h3>
    </div>
    <form method="POST" class="p-6 space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Nombre *</label>
            <input type="text" name="name" value="{{ budget.name|default:'' }}" required placeholder="Ej: Presupuesto Anual 2025"
                   class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
        </div>
        <div>
            <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Período *</label>
            <select name="period" required class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
                <option value="monthly" {% if budget.period == 'monthly' %}selected{% endif %}>Mensual</option>
                <option value="quarterly" {% if budget.period == 'quarterly' %}selected{% endif %}>Trimestral</option>
                <option value="annual" {% if not budget or budget.period == 'annual' %}selected{% endif %}>Anual</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-5">
            <div>
                <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Fecha Inicio *</label>
                <input type="date" name="start_date" value="{{ budget.start_date|date:'Y-m-d'|default:today }}" required
                       class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Fecha Fin *</label>
                <input type="date" name="end_date" value="{{ budget.end_date|date:'Y-m-d'|default:'' }}" required
                       class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-5">
            <div>
                <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Meta de Ingresos</label>
                <input type="number" name="total_income_budget" value="{{ budget.total_income_budget|default:'0' }}" min="0" step="0.01"
                       class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Límite de Egresos</label>
                <input type="number" name="total_expense_budget" value="{{ budget.total_expense_budget|default:'0' }}" min="0" step="0.01"
                       class="w-full border-b-2 border-black p-2 focus:outline-none text-sm bg-transparent">
            </div>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray uppercase tracking-wider mb-2">Notas</label>
            <textarea name="notes" rows="3" class="w-full border border-light-gray p-2 focus:outline-none text-sm resize-none">{{ budget.notes|default:'' }}</textarea>
        </div>
        <div class="flex items-center gap-3 pt-4 border-t border-light-gray">
            <button type="submit" class="px-6 py-2.5 bg-primary text-white text-sm hover:bg-primary-dark transition-colors">
                {{ action }} Presupuesto
            </button>
            <a href="{% url 'finance:budgets_list' %}" class="px-6 py-2.5 border border-black text-black text-sm hover:bg-black hover:text-white transition-colors">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
